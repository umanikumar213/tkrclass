<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Confession Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#7B1800; --maroon-dark:#5e1200; --gold:#E8A000; --gold-soft:#fdf3df;
    --bg:#faf7f4; --card:#fff; --line:#eee2da; --ink:#241a16; --sub:#7a6a62; --faint:#a89a92;
    --red:#dc2626; --red-soft:#fdecec; --green:#0f9d58;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 80px}

  /* --- header --- */
  header{margin-bottom:14px}
  header .eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  header h1{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--maroon);margin-top:2px}
  header p{color:var(--sub);font-size:12px;margin-top:2px}

  /* --- compose box --- */
  .compose{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px}
  textarea{width:100%;min-height:64px;max-height:160px;padding:9px 10px;font-family:inherit;font-size:14px;
    color:var(--ink);border:1px solid var(--line);border-radius:8px;outline:none;resize:vertical}
  textarea:focus{border-color:var(--maroon);box-shadow:0 0 0 3px #7b180014}
  .compose-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .cnt{font-size:11px;color:var(--faint);white-space:nowrap;margin-left:auto}
  .filebtn{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border:1px dashed var(--line);
    border-radius:8px;font-size:12px;color:var(--sub);cursor:pointer;background:#fffdf8;white-space:nowrap}
  .filebtn:hover{border-color:var(--gold);color:var(--maroon)}
  #fileName{font-size:12px;color:var(--sub);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #clearImg{display:none;font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
  .btn{flex:1;min-width:120px;padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;
    font-weight:600;font-size:13px;color:#fff;background:var(--maroon);transition:.15s;white-space:nowrap}
  .btn:hover{background:var(--maroon-dark)} .btn:disabled{opacity:.55;cursor:not-allowed}
  .msg{margin-top:8px;padding:9px 12px;border-radius:8px;font-size:12px;display:none}
  .msg.ok{background:var(--gold-soft);color:#8a6100;display:block}
  .msg.bad{background:var(--red-soft);color:var(--red);display:block}

  /* --- day filter --- */
  .days{display:flex;gap:6px;overflow-x:auto;padding:2px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .days::-webkit-scrollbar{display:none}
  .day{flex-shrink:0;padding:7px 11px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;
    font-family:inherit;font-size:11px;font-weight:500;color:var(--sub);text-align:center;line-height:1.3;transition:.15s}
  .day b{display:block;font-size:12px;color:var(--ink)}
  .day.active{background:var(--maroon);border-color:var(--maroon)}
  .day.active b,.day.active{color:#fff}

  /* --- posts --- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
  .post{padding:14px 16px}
  .post .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .pnum{font-weight:700;font-size:15px;color:var(--maroon)}
  .pdate{font-size:11px;color:var(--faint)}
  .ptext{font-size:14px;white-space:pre-wrap;word-break:break-word}
  .pimg{margin-top:10px;border-radius:10px;max-width:100%;display:block;border:1px solid var(--line);opacity:0;transition:opacity .35s ease}
  .pimg.loaded{opacity:1}
  .pfoot{margin-top:10px;display:flex;justify-content:space-between;align-items:center}
  .report{background:none;border:none;font-family:inherit;font-size:11px;color:var(--faint);cursor:pointer}
  .report:hover{color:var(--red)}
  .empty{text-align:center;color:var(--faint);font-size:14px;padding:36px 0}

  /* --- reactions --- */
  .reactions{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .rbtn{display:inline-flex;align-items:center;gap:3px;padding:5px 9px;border:1px solid var(--line);
    border-radius:20px;background:#fff;font-family:inherit;font-size:14px;cursor:pointer;
    color:var(--sub);transition:.12s;white-space:nowrap;line-height:1}
  .rbtn:hover{border-color:var(--gold);background:var(--gold-soft)}
  .rbtn.sel{background:var(--gold-soft);border-color:var(--gold);color:var(--maroon)}
  .rbtn span{font-size:12px;font-weight:500}

  /* --- load more --- */
  #loadMoreBtn{display:none;width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;
    background:#fff;font-family:inherit;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;margin-top:4px;transition:.15s}
  #loadMoreBtn:hover{border-color:var(--maroon);color:var(--maroon)}
  #loadMoreBtn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Anonymous · No names · No logins</div>
    <h1>Confession Board</h1>
    <p>Posts vanish after 7 days.</p>
  </header>

  <div class="compose">
    <textarea id="text" maxlength="500" placeholder="Your confession or opinion… (max 500 characters)"></textarea>
    <div class="compose-row">
      <label class="filebtn">📷 Image<input type="file" id="img" accept=".jpg,.jpeg,.png,.webp" hidden></label>
      <span id="fileName"></span>
      <button id="clearImg" onclick="clearImage()">✕</button>
      <span class="cnt"><span id="cnt">0</span>/500</span>
      <button class="btn" id="submitBtn" onclick="submitPost()">Submit anonymously</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

  <div class="days" id="days"></div>
  <div id="feed"></div>
  <button id="loadMoreBtn" onclick="loadMore()">Load more posts</button>
</div>

<script>
const txt=document.getElementById('text'),cnt=document.getElementById('cnt'),imgIn=document.getElementById('img');
let selectedDay=null, currentPage=1, hasMore=false, loading=false;

txt.addEventListener('input',()=>cnt.textContent=txt.value.length);
imgIn.addEventListener('change',()=>{
  const f=imgIn.files[0];
  document.getElementById('fileName').textContent=f?f.name:'';
  document.getElementById('clearImg').style.display=f?'inline':'none';
});
function clearImage(){imgIn.value='';document.getElementById('fileName').textContent='';document.getElementById('clearImg').style.display='none';}
function showMsg(t,ok){const m=document.getElementById('msg');m.className='msg '+(ok?'ok':'bad');m.textContent=t;}

async function submitPost(){
  const btn=document.getElementById('submitBtn');
  const text=txt.value.trim();
  if(!text){showMsg('Please write something first.',false);return;}
  const f=imgIn.files[0];
  if(f&&f.size>5*1024*1024){showMsg('Image must be under 5MB.',false);return;}
  btn.disabled=true;btn.textContent='Submitting…';
  try{
    const fd=new FormData();fd.append('text',text);if(f)fd.append('image',f);
    const r=await fetch('/api/chat/posts',{method:'POST',body:fd});
    const d=await r.json();
    showMsg(d.message||(d.success?'Submitted!':'Something went wrong.'),d.success);
    if(d.success){txt.value='';cnt.textContent='0';clearImage();}
  }catch(e){showMsg('Cannot reach server. Try again.',false);}
  btn.disabled=false;btn.textContent='Submit anonymously';
}

function buildDays(){
  const el=document.getElementById('days');
  const names=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html=`<button class="day ${selectedDay===null?'active':''}" onclick="pickDay(null)"><b>All</b>posts</button>`;
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const label=i===0?'Today':names[d.getDay()];
    html+=`<button class="day ${selectedDay===iso?'active':''}" onclick="pickDay('${iso}')"><b>${label}</b>${d.getDate()}/${d.getMonth()+1}</button>`;
  }
  el.innerHTML=html;
}
function pickDay(d){selectedDay=d;buildDays();resetFeed();loadFeed();}

function resetFeed(){currentPage=1;hasMore=false;document.getElementById('feed').innerHTML='';document.getElementById('loadMoreBtn').style.display='none';}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtDate(s){const d=new Date(s);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});}

// --- reactions ---
const EMOJIS=[['heart','❤️'],['laugh','😂'],['wow','😮'],['sad','😢'],['fire','🔥'],['up','👍']];
function getReaction(id){return localStorage.getItem('react_'+id)||null;}
function setReaction(id,emoji){if(emoji)localStorage.setItem('react_'+id,emoji);else localStorage.removeItem('react_'+id);}

function reactRow(p){
  const cur=getReaction(p.id);
  return '<div class="reactions">'+EMOJIS.map(([k,e])=>
    `<button class="rbtn${cur===k?' sel':''}" onclick="react(${p.id},'${k}',this.closest('.reactions'))">${e} <span>${p['react_'+k]||0}</span></button>`
  ).join('')+'</div>';
}

async function react(id,tapped,container){
  const prev=getReaction(id);
  const emoji=tapped===prev?null:tapped; // null = toggle off
  // Optimistic update
  const btns=container.querySelectorAll('.rbtn');
  EMOJIS.forEach(([k],i)=>{
    const span=btns[i].querySelector('span');
    let c=parseInt(span.textContent,10)||0;
    if(k===prev&&prev!==emoji)c=Math.max(0,c-1);
    if(k===emoji)c++;
    span.textContent=c;
    btns[i].classList.toggle('sel',k===emoji);
  });
  setReaction(id,emoji);
  try{
    await fetch('/api/chat/posts/'+id+'/react',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({emoji,prev})
    });
  }catch(e){}
}

async function loadFeed(){
  if(loading)return;
  loading=true;
  const feed=document.getElementById('feed');
  const loadMoreBtn=document.getElementById('loadMoreBtn');
  if(currentPage===1)feed.innerHTML='<div class="empty">Loading…</div>';
  else{loadMoreBtn.disabled=true;loadMoreBtn.textContent='Loading…';}
  try{
    let url='/api/chat/posts?page='+currentPage;
    if(selectedDay)url+='&day='+selectedDay;
    const r=await fetch(url);
    const d=await r.json();
    if(!d.success){
      if(currentPage===1)feed.innerHTML='<div class="empty">Could not load posts.</div>';
      loading=false;return;
    }
    if(currentPage===1&&!d.posts.length){
      feed.innerHTML='<div class="empty">No confessions '+(selectedDay?'on this day':'yet')+'. Be the first 👀</div>';
      loadMoreBtn.style.display='none';loading=false;return;
    }
    if(currentPage===1)feed.innerHTML='';
    feed.insertAdjacentHTML('beforeend',d.posts.map(p=>`
      <div class="card post">
        <div class="top"><span class="pnum">#${p.post_number}</span><span class="pdate">${fmtDate(p.created_at)}</span></div>
        <div class="ptext">${esc(p.text)}</div>
        ${p.has_image?`<img class="pimg" src="/api/chat/image/${p.id}" loading="lazy" alt="" onload="this.classList.add('loaded')">`:''}
        ${reactRow(p)}
        <div class="pfoot"><span></span><button class="report" onclick="report(${p.id},this)">⚑ Report</button></div>
      </div>`).join(''));
    hasMore=d.hasMore;
    loadMoreBtn.style.display=hasMore?'block':'none';
    loadMoreBtn.disabled=false;
    loadMoreBtn.textContent='Load more posts';
  }catch(e){
    if(currentPage===1)feed.innerHTML='<div class="empty">Cannot reach server.</div>';
  }
  loading=false;
}

async function loadMore(){
  if(!hasMore||loading)return;
  currentPage++;
  await loadFeed();
}

async function report(id,btn){
  if(!confirm('Report this post to the admin?'))return;
  try{
    const r=await fetch('/api/chat/posts/'+id+'/report',{method:'POST'});
    const d=await r.json();
    btn.textContent=d.success?'Reported ✓':'⚑ Report';btn.disabled=d.success;
  }catch(e){}
}
buildDays();loadFeed();
</script>
</body>
</html>
