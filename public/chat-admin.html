<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Confession Board</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--maroon:#7B1800;--gold:#E8A000;--bg:#faf7f4;--card:#fff;--line:#eee2da;--ink:#241a16;--sub:#7a6a62;
    --faint:#a89a92;--red:#dc2626;--red-soft:#fdecec;--green:#0f9d58;--green-soft:#e9f6ee;--amber-soft:#fdf3df}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:28px 16px 80px}
  h1{font-size:22px;color:var(--maroon);margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;padding:18px}
  input{width:100%;padding:12px;font-family:inherit;font-size:15px;border:1px solid var(--line);border-radius:10px;outline:none}
  input:focus{border-color:var(--maroon)}
  .btn{width:100%;margin-top:12px;padding:12px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;
    font-weight:600;font-size:14px;color:#fff;background:var(--maroon)}
  .btn:disabled{opacity:.55}
  .err{margin-top:10px;font-size:13px;color:var(--red);display:none}
  .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;margin-bottom:8px}
  .tag.pending{background:var(--amber-soft);color:#8a6100}
  .tag.reported{background:var(--red-soft);color:var(--red)}
  .ptext{font-size:14px;white-space:pre-wrap;word-break:break-word}
  .pimg{margin-top:10px;border-radius:10px;max-width:100%;border:1px solid var(--line)}
  .pdate{font-size:11px;color:var(--faint);margin-top:6px}
  .row{display:flex;gap:8px;margin-top:12px}
  .act{flex:1;padding:10px;border:none;border-radius:9px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;color:#fff}
  .approve{background:var(--green)} .reject{background:var(--red)} .keep{background:var(--sub)}
  .empty{text-align:center;color:var(--faint);font-size:14px;padding:36px 0}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .link{background:none;border:none;font-family:inherit;font-size:13px;color:var(--sub);cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div id="loginView">
    <h1>Admin login</h1>
    <div class="card">
      <input type="password" id="pass" placeholder="Admin password" onkeypress="if(event.key==='Enter')login()">
      <button class="btn" id="loginBtn" onclick="login()">Login</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <div id="adminView" style="display:none">
    <div class="topbar"><h1 style="margin:0">Review queue</h1><button class="link" onclick="logout()">Logout</button></div>
    <div id="queue"></div>
  </div>
</div>

<script>
let PASS='';
function hdr(){return {'x-admin-password':PASS};}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtDate(s){const d=new Date(s);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});}

async function login(){
  const p=document.getElementById('pass').value;
  const err=document.getElementById('loginErr');err.style.display='none';
  if(!p){err.style.display='block';err.textContent='Enter the password.';return;}
  const btn=document.getElementById('loginBtn');btn.disabled=true;
  try{
    const r=await fetch('/api/chat/admin/login',{method:'POST',headers:{'x-admin-password':p}});
    const d=await r.json();
    if(d.success){PASS=p;show();}
    else{err.style.display='block';err.textContent=d.message||'Wrong password.';}
  }catch(e){err.style.display='block';err.textContent='Cannot reach server.';}
  btn.disabled=false;
}
function logout(){PASS='';
  document.getElementById('adminView').style.display='none';document.getElementById('loginView').style.display='block';}
function show(){document.getElementById('loginView').style.display='none';
  document.getElementById('adminView').style.display='block';loadQueue();}

async function loadQueue(){
  const q=document.getElementById('queue');q.innerHTML='<div class="empty">Loading…</div>';
  try{
    const r=await fetch('/api/chat/admin/queue',{headers:hdr()});
    if(r.status===401){logout();return;}
    const d=await r.json();
    if(!d.posts.length){q.innerHTML='<div class="empty">Nothing to review 🎉</div>';return;}
    q.innerHTML=d.posts.map(p=>{
      const isReported=p.status==='approved'&&p.reported;
      return `<div class="card">
        <span class="tag ${isReported?'reported':'pending'}">${isReported?'⚑ Reported · #'+p.post_number:'Pending approval'}</span>
        <div class="ptext">${esc(p.text)}</div>
        ${p.has_image?`<img class="pimg" src="/api/chat/image/${p.id}" onerror="this.remove()">`:''}
        <div class="pdate">${fmtDate(p.created_at)}</div>
        <div class="row">
          ${isReported
            ?`<button class="act keep" onclick="act('unflag',${p.id})">Keep post</button>
              <button class="act reject" onclick="act('reject',${p.id},true)">Delete post</button>`
            :`<button class="act approve" onclick="act('approve',${p.id})">Approve</button>
              <button class="act reject" onclick="act('reject',${p.id},true)">Reject</button>`}
        </div>
      </div>`;}).join('');
    // admin needs the password to see pending images
    document.querySelectorAll('.pimg').forEach(async img=>{
      try{const r=await fetch(img.getAttribute('src'),{headers:hdr()});
        if(r.ok){img.src=URL.createObjectURL(await r.blob());}else{img.remove();}}catch(e){img.remove();}
    });
  }catch(e){q.innerHTML='<div class="empty">Could not load queue.</div>';}
}
async function act(kind,id,confirmIt){
  if(confirmIt&&!confirm('Permanently delete this post and its image? This cannot be undone.'))return;
  try{
    const r=await fetch('/api/chat/admin/'+kind+'/'+id,{method:'POST',headers:hdr()});
    if(r.status===401){logout();return;}
    await r.json();loadQueue();
  }catch(e){alert('Action failed. Try again.');}
}
</script>
</body>
</html>
